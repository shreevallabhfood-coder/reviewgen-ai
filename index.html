<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ReviewGen AI V4</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="bg"></div>
<div class="card">
<img src="assets/logo.png" class="logo">
<h1>Thank you for choosing Shreevallabh</h1>
<p>Your feedback helps us serve you better.</p>

<div class="lang">
<button>EN</button><button>हिं</button><button>ગુ</button>
</div>

<div id="wizard">
<div class="step">
<h2>1. Select Event</h2>
<select id="event">
<option>Wedding</option>
<option>Birthday</option>
<option>Corporate</option>
<option>Housewarming</option>
<option>Festival</option>
<option>Other</option>
</select>
</div>

<div class="step">
<h2>2. Rate Us</h2>
<div class="stars" id="food"></div>
<div class="caption">Food</div>
<div class="stars" id="service"></div>
<div class="caption">Service</div>
</div>

<div class="step">
<h2>3. Tell us more</h2>
<textarea id="comments" placeholder="Share your experience..."></textarea>
<button onclick="generate()">✨ Generate AI Review</button>
</div>
</div>

<div id="result" class="hidden">
<h2>Your Review</h2>
<textarea id="review"></textarea>
<div class="actions">
<button onclick="copyReview()">📋 Copy</button>
<button onclick="window.open('https://search.google.com/local/writereview?placeid=ChIJQ0w0F7K5wjsRzAlDupaKUho','_blank')">⭐ Google</button>
</div>
<button class="back" onclick="location.reload()">↺ Start Again</button>
</div>

</div>
<script src="js/app.js"></script>
</body></html>
