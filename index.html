<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Rajshree Foods ReviewGen AI V1.1</title><link rel="stylesheet" href="style.css?v=1.1"></head><body><main class="wrap"><section class="card"><header class="brand"><img src="logo.png" class="logo" alt="Rajshree Foods logo"><div><p class="tag">ReviewGen AI V1.1</p><h1>Generate natural customer reviews</h1><p class="desc">Human-style Google review drafts for Rajshree Foods snacks and sweets.</p></div></header><div class="status">AI Mode: Human-style smart generator</div><section id="formScreen" class="grid"><div class="panel"><h2>Customer Details</h2><label>Language</label><select id="language"><option>English</option><option>Hindi</option><option>Marathi</option><option>Gujarati</option></select><label>Product / Item</label><select id="productType"><option>Bhajani Chakli</option><option>Karanji</option><option>Besan Ladoo</option><option>Rava Ladoo</option><option>Dink Ladoo</option><option>Pohe Chivda</option><option>Shankarpali</option><option>Puranpoli</option><option>Mixed Snacks & Sweets</option><option>Other Homemade Item</option></select><label>Review Tone</label><select id="tone"><option>Warm & Natural</option><option>Short & Simple</option><option>Traditional & Family Style</option><option>Premium Quality</option><option>Emotional & Festive</option></select><label>Review Length</label><select id="length"><option>Short</option><option>Medium</option><option>Detailed</option></select></div><div class="panel"><h2>Ratings & Highlights</h2><div class="rating"><b>Taste</b><div id="tasteStars" class="stars"></div></div><div class="rating"><b>Freshness / Quality</b><div id="qualityStars" class="stars"></div></div><label>What did the customer like most?</label><textarea id="likedMost" placeholder="Example: authentic homemade taste, crispy chakli, fresh ladoos, good packaging"></textarea><label>Specific product / occasion mention <span>optional</span></label><input id="specialMention" placeholder="Example: Diwali snacks, gift box, chakli, karanji"><button id="generateBtn" class="primary">✨ Generate Human-Style Review</button></div></section><section id="resultScreen" class="result hidden"><div class="top"><div><p class="tag">Generated Review</p><h2>Your ready-to-post review</h2></div><button id="againBtn" class="secondary small">↺ Edit Details</button></div><textarea id="reviewOutput"></textarea><div class="actions"><button id="freshBtn">✨ New Version</button><button id="copyBtn">📋 Copy Review</button><button id="googleBtn">⭐ Post on Google</button></div></section></section></main><script src="app.js?v=1.1"></script></body></html>
