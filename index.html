<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>ReviewGen AI</title><link rel='stylesheet' href='css/style.css'></head>
<body>
<div class='bg'></div>
<div class='card'>
<h1>🌸 Shreevallabh</h1>
<p>Caterers, Kitchens & Hospitality LLP</p>

<div class='lang'>
<button onclick="lang('en')">EN</button>
<button onclick="lang('hi')">हिन्दी</button>
<button onclick="lang('gu')">ગુજરાતી</button>
</div>

<div id='step1'>
<h2 id='t1'>What was your event?</h2>
<select id='event'>
<option>Wedding</option><option>Birthday</option><option>Corporate</option>
<option>Housewarming</option><option>Festival</option><option>Other</option>
</select>
<label>Food ⭐⭐⭐⭐⭐</label><input type='range' id='food' min='1' max='5' value='5'>
<label>Service ⭐⭐⭐⭐⭐</label><input type='range' id='service' min='1' max='5' value='5'>
<textarea id='comments' placeholder='Anything special?'></textarea>
<button onclick='generateReview()'>✨ Generate Review</button>
</div>

<div id='out' style='display:none'>
<h2 id='rtitle'>Your Review</h2>
<textarea id='review'></textarea>
<button onclick='copyReview()'>📋 Copy Review</button>
<button onclick="window.open('https://search.google.com/local/writereview?placeid=ChIJQ0w0F7K5wjsRzAlDupaKUho','_blank')">⭐ Open Google Review</button>
</div>

</div>
<script src='js/app.js'></script>
</body></html>
