<!DOCTYPE html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ReviewGen AI</title>
<link rel="stylesheet" href="css/style.css">
</head><body>
<div class="container">
<div class="card">
<img class="logo" src="assets/logo.png">
<h1>Shreevallabh</h1>
<p>Caterers • Kitchens • Hospitality LLP</p>
<div class="progress"><div id="bar"></div></div>

<div id="step1" class="step">
<h2>What was your event?</h2>
<select id="event">
<option>Wedding</option><option>Birthday</option><option>Corporate</option><option>Housewarming</option><option>Festival</option>
</select>
<button onclick="next()">Continue →</button>
</div>

<div id="step2" class="step hide">
<h2>Rate your experience</h2>
<label>Food</label><input id="food" type="range" min="1" max="5" value="5">
<label>Service</label><input id="service" type="range" min="1" max="5" value="5">
<textarea id="comments" placeholder="Anything special?"></textarea>
<button onclick="generate()">✨ Generate Review</button>
</div>

<div id="step3" class="step hide">
<h2>Your AI Review</h2>
<textarea id="review"></textarea>
<button onclick="copyReview()">📋 Copy Review</button>
<button onclick="window.open('https://search.google.com/local/writereview?placeid=ChIJQ0w0F7K5wjsRzAlDupaKUho','_blank')">⭐ Post on Google</button>
</div>
</div></div>
<script src="js/app.js"></script></body></html>
